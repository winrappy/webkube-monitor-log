version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: go-kube-monitor-backend
    environment:
      PORT: 8081
      GRPC_PORT: 9090
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      KUBECONFIG: /root/.kube/config
      CLOUDSDK_CONFIG: /root/.config/gcloud
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
    ports:
      - "${BACKEND_PORT}:8081"
      - "${GRPC_PORT}:9090"
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
      - ${HOME}/.config/gcloud:/root/.config/gcloud
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: go-kube-monitor-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    restart: unless-stopped
